<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        </div>

    <script>
        console.log("Embedded script running!");
        let mode = '';
        function startGame(selectedMode) {
            console.log("Mode selected:", selectedMode);
            mode = selectedMode;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        }
        <h1>RPS Game</h1>
        <div id="menu">
            <button onclick="startGame('vs-comp')">Vs Computer</button>
            <button onclick="startGame('local')">Local Multiplayer</button>
        </div>
        <div id="game-ui" style="display: none;">
            <p id="turn-info">Player 1's turn</p>
            <button onclick="handleInput('rock')">🪨</button>
            <button onclick="handleInput('paper')">📄</button>
            <button onclick="handleInput('scissors')">✂️</button>
            <h2 id="result">Choose your weapon!</h2>
            <button onclick="location.reload()">Reset Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
