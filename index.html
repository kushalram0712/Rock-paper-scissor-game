<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="game-container">
        <h1>RPS Game</h1>
        <div id="menu">
            <button onclick="startGame('vs-comp')">Vs Computer</button>
            <button onclick="startGame('local')">Local Multiplayer</button>
        </div>
        <div id="game-ui" style="display: none;">
            <p id="turn-info">Player 1's turn</p>
            <button onclick="handleInput('rock')">🪨</button>
            <button onclick="handleInput('paper')">📄</button>
            <button onclick="handleInput('scissors')">✂️</button>
            <h2 id="result">Choose your weapon!</h2>
            <button onclick="location.reload()">Reset Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
