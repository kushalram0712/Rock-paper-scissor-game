<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>RPS Arena</h1>

        <!-- Menu Section -->
        <div id="menu">
            <p>Select Game Mode:</p>
            <button onclick="startGame('vs-comp')">Vs Computer</button>
            <button onclick="startGame('local')">Local Multiplayer</button>
        </div>

        <!-- Game Interface (Hidden by default) -->
        <div id="game-ui" style="display: none;">
            <div class="score-board">
                <p id="turn-info">Player 1's turn</p>
                <p>P1 Score: <span id="p1-score">0</span> | P2/CPU: <span id="p2-score">0</span></p>
            </div>
            
            <div class="choices">
                <button onclick="handleInput('rock')">🪨 Rock</button>
                <button onclick="handleInput('paper')">📄 Paper</button>
                <button onclick="handleInput('scissors')">✂️ Scissors</button>
            </div>

            <h2 id="result">Choose your weapon!</h2>
            <button class="reset-btn" onclick="resetGame()">Main Menu</button>
        </div>
    </div>

    <script>
        let mode = '';
        let p1Choice = '';
        let p1Score = 0;
        let p2Score = 0;
        let isPlayer1Turn = true;

        function startGame(selectedMode) {
            mode = selectedMode;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        }

        function handleInput(choice) {
            if (mode === 'vs-comp') {
                const choices = ['rock', 'paper', 'scissors'];
                const comp = choices[Math.floor(Math.random() * 3)];
                determineWinner(choice, comp);
            } else {
                if (isPlayer1Turn) {
                    p1Choice = choice;
                    isPlayer1Turn = false;
                    document.getElementById('turn-info').innerText = "Player 2's turn";
                } else {
                    determineWinner(p1Choice, choice);
                    isPlayer1Turn = true;
                    document.getElementById('turn-info').innerText = "Player 1's turn";
                }
            }
        }

        function determineWinner(c1, c2) {
            let result = "";
            if (c1 === c2) {
                result = `Tie! Both chose ${c1}`;
            } else if ((c1==='rock'&&c2==='scissors')||(c1==='paper'&&c2==='rock')||(c1==='scissors'&&c2==='paper')) {
                p1Score++;
                result = `Player 1 wins! (${c1} > ${c2})`;
            } else {
                p2Score++;
                result = `Player 2/CPU wins! (${c2} > ${c1})`;
            }
            document.getElementById('p1-score').innerText = p1Score;
            document.getElementById('p2-score').innerText = p2Score;
            document.getElementById('result').innerText = result;
        }

        function resetGame() {
            p1Score = 0; p2Score = 0; isPlayer1Turn = true;
            document.getElementById('p1-score').innerText = "0";
            document.getElementById('p2-score').innerText = "0";
            document.getElementById('result').innerText = "Choose your weapon!";
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-ui').style.display = 'none';
        }
    </script>
</body>
</html>
